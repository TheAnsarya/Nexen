name: Build Nexen

on:
  push:
    branches: ['**']
    tags: ['v*']

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  WARNING_BASELINE_WINDOWS: 0
  WARNING_BASELINE_LINUX: 0
  WARNING_BASELINE_APPIMAGE: 0
  WARNING_FAIL_ON_REGRESSION: 0

jobs:
  windows:
    strategy:
      matrix:
        platform: [
          {aot: false, singleFile: true, aotString: ""},
          {aot: true, singleFile: false, aotString: " - AoT"}
        ]
      fail-fast: false
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Pansy (for Pansy.Core reference)
        shell: bash
        run: git clone --depth 1 https://github.com/TheAnsarya/pansy.git "$GITHUB_WORKSPACE/../pansy"

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64
          vs-prerelease: true

      - name: Restore packages
        run: dotnet restore -r win-x64 -p:PublishAot="${{ matrix.platform.aot }}" -p:BuildWithNetFrameworkHostedCompiler=true

      - name: Write commit SHA1 to file
        uses: ./.github/actions/build-sha1-action

      - name: Build C++ core (InteropDLL)
        run: msbuild -nologo -v:m -clp:ForceConsoleColor -m -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v145 -t:InteropDLL Nexen.sln

      - name: Copy native libs from NuGet cache
        shell: pwsh
        run: |
          $outDir = "bin\win-x64\Release"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          # Find and copy SkiaSharp native libs from NuGet packages
          $nugetCache = Join-Path $env:USERPROFILE ".nuget\packages"
          $skipNativeLibs = Join-Path $nugetCache "skiasharp.nativeassets.win32\*\runtimes\win-x64\native\libSkiaSharp.dll"
          $harfNativeLibs = Join-Path $nugetCache "harfbuzzsharp.nativeassets.win32\*\runtimes\win-x64\native\libHarfBuzzSharp.dll"

          $skiaDll = Get-ChildItem -Path $skipNativeLibs | Select-Object -Last 1
          $harfDll = Get-ChildItem -Path $harfNativeLibs | Select-Object -Last 1

          if ($skiaDll) {
            Copy-Item $skiaDll.FullName -Destination $outDir -Force
            Write-Host "Copied: $($skiaDll.FullName)"
          } else {
            Write-Error "libSkiaSharp.dll not found in NuGet cache"
            exit 1
          }

          if ($harfDll) {
            Copy-Item $harfDll.FullName -Destination $outDir -Force
            Write-Host "Copied: $($harfDll.FullName)"
          } else {
            Write-Error "libHarfBuzzSharp.dll not found in NuGet cache"
            exit 1
          }

      - name: Package Dependencies.zip
        run: ./scripts/package-dependencies.ps1 -Configuration Release
        shell: pwsh

      - name: Build UI
        run: msbuild -nologo -v:m -clp:ForceConsoleColor -m -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v145 -t:UI Nexen.sln

      - name: Publish Nexen
        run: dotnet publish --no-restore -c Release -p:PublishAot="${{ matrix.platform.aot }}" -p:SelfContained="${{ matrix.platform.aot }}" -p:PublishSingleFile="${{ matrix.platform.singleFile }}" -p:IncludeNativeLibrariesForSelfExtract="${{ matrix.platform.singleFile }}" -p:OptimizeUi="true" -r win-x64 -o build/publish UI/UI.csproj

      - name: Generate warning report (Windows)
        continue-on-error: true
        shell: pwsh
        run: |
          $warningLog = "build-warning-report.txt"
          msbuild Nexen.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v145 /m /nologo /clp:WarningsOnly 2>&1 | Tee-Object -FilePath $warningLog
          if (!(Test-Path $warningLog) -or (Get-Item $warningLog).Length -eq 0) {
            "No warnings detected (WarningsOnly output was empty)." | Out-File -FilePath $warningLog -Encoding utf8
          }

      - name: Upload warning report (Windows)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Warning Report (Windows${{ matrix.platform.aotString }})
          path: build-warning-report.txt

      - name: Generate warning delta summary (Windows)
        if: always()
        shell: pwsh
        run: |
          $baseline = [int]$env:WARNING_BASELINE_WINDOWS
          $count = 0
          if (Test-Path "build-warning-report.txt") {
            $count = (Get-Content "build-warning-report.txt" | Where-Object { $_ -match "\bwarning\b" -and $_ -notmatch "^No warnings detected" }).Count
          }

          $delta = $count - $baseline
          @(
            "job=windows${{ matrix.platform.aotString }}"
            "baseline=$baseline"
            "count=$count"
            "delta=$delta"
          ) | Out-File -FilePath "build-warning-delta-windows.txt" -Encoding utf8

      - name: Upload warning delta summary (Windows)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Warning Delta (Windows${{ matrix.platform.aotString }})
          path: build-warning-delta-windows.txt

      - name: Enforce warning regression gate (Windows)
        if: always()
        shell: pwsh
        run: |
          if ($env:WARNING_FAIL_ON_REGRESSION -ne "1") {
            Write-Host "WARNING_FAIL_ON_REGRESSION is disabled; skipping gate."
            exit 0
          }

          $deltaLine = Get-Content "build-warning-delta-windows.txt" | Where-Object { $_ -like "delta=*" }
          if (-not $deltaLine) {
            Write-Error "Could not read warning delta from build-warning-delta-windows.txt"
            exit 1
          }

          $delta = [int]($deltaLine -replace "delta=", "")
          if ($delta -gt 0) {
            Write-Error "Warning regression detected in Windows job (delta=$delta)."
            exit 1
          }

          Write-Host "Warning regression gate passed for Windows (delta=$delta)."

      - name: Upload Nexen
        uses: actions/upload-artifact@v4
        with:
          name: Nexen (Windows${{ matrix.platform.aotString }})
          path: |
            build/publish/Nexen.exe


  linux:
    strategy:
      matrix:
        compiler: [gcc, clang, clang_aot]
        platform: [
          {os: ubuntu-22.04, path: x64},
          {os: ubuntu-22.04-arm, path: arm64}
        ]
        exclude:
          # ARM64 AOT build doesn't seem to work properly (crashes when launched)
          - platform: { os: ubuntu-22.04-arm, path: arm64 }
            compiler: clang_aot
        include:
          - compiler: gcc
            make_flags: "USE_GCC=true"
          - compiler: clang
            make_flags: ""
          - compiler: clang_aot
            make_flags: "USE_AOT=true"
      fail-fast: false
    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Pansy (for Pansy.Core reference)
        shell: bash
        run: git clone --depth 1 https://github.com/TheAnsarya/pansy.git "$GITHUB_WORKSPACE/../pansy"

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Install dependencies
        run: |
          sudo apt-get update -qy
          sudo apt-get install -qy libsdl2-dev ccache xvfb # The compilers are already installed on GitHub's runners.

      # Install GCC 13 for C++23 <format> support (default GCC 11 on ubuntu-22.04 doesn't have it)
      - name: Install GCC 13
        if: matrix.compiler == 'gcc'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-13 gcc-13
          echo "CC=gcc-13" >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV

      # Install LLVM 18 for C++23 support (default clang on ubuntu-22.04 doesn't support c++23)
      # Also install libc++ since the system libstdc++ doesn't have <format>
      - name: Install LLVM 18
        if: matrix.compiler != 'gcc'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Setup CCache
        uses: ./.github/actions/setup-ccache-action

      - name: Write commit SHA1 to file
        uses: ./.github/actions/build-sha1-action

      # stderr is not detected as a TTY, so diagnostics are by default printed without colours;
      # forcing colours makes the log a little nicer to read.
      # Pass CC/CXX explicitly since makefile ignores environment variables
      # For clang, also use libc++ for C++23 <format> support
      - name: Build Nexen
        run: |
          set -o pipefail
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            make -j$(nproc) -O ${{ matrix.make_flags }} LTO=true STATICLINK=true SYSTEM_LIBEVDEV=false CC=gcc-13 CXX=g++-13 2>&1 | tee build-linux.log
          else
            make -j$(nproc) -O ${{ matrix.make_flags }} LTO=true STATICLINK=true SYSTEM_LIBEVDEV=false CC=clang-18 CXX=clang++-18 NEXENFLAGS="-stdlib=libc++" 2>&1 | tee build-linux.log
          fi

      - name: Capture Linux runtime dependency report
        if: always()
        run: |
          publish_dir="bin/linux-${{ matrix.platform.path }}/Release/linux-${{ matrix.platform.path }}/publish"
          if [ -f "$publish_dir/Nexen" ]; then
            ldd "$publish_dir/Nexen" > runtime-deps-linux.txt || true
            readelf -d "$publish_dir/Nexen" > runtime-readelf-linux.txt || true
          else
            echo "Publish binary missing: $publish_dir/Nexen" > runtime-deps-linux.txt
            echo "Publish binary missing: $publish_dir/Nexen" > runtime-readelf-linux.txt
          fi

      - name: Upload runtime dependency report (Linux)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Runtime Dependencies (Linux - ${{ matrix.platform.os }} - ${{ matrix.compiler }})
          path: |
            runtime-deps-linux.txt
            runtime-readelf-linux.txt

      - name: Generate warning report (Linux)
        if: always()
        run: |
          if [ -f build-linux.log ]; then
            grep -Ei "warning" build-linux.log > build-warning-report-linux.txt || true
          fi

          if [ ! -f build-warning-report-linux.txt ] || [ ! -s build-warning-report-linux.txt ]; then
            echo "No warnings detected in Linux build log." > build-warning-report-linux.txt
          fi

      - name: Upload warning report (Linux)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Warning Report (Linux - ${{ matrix.platform.os }} - ${{ matrix.compiler }})
          path: build-warning-report-linux.txt

      - name: Generate warning delta summary (Linux)
        if: always()
        run: |
          baseline="${WARNING_BASELINE_LINUX}"
          count=0
          if [ -f build-warning-report-linux.txt ]; then
            count=$(grep -Eic "\\bwarning\\b" build-warning-report-linux.txt || true)
          fi
          delta=$((count - baseline))
          {
            echo "job=linux-${{ matrix.platform.os }}-${{ matrix.compiler }}"
            echo "baseline=$baseline"
            echo "count=$count"
            echo "delta=$delta"
          } > build-warning-delta-linux.txt

      - name: Upload warning delta summary (Linux)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Warning Delta (Linux - ${{ matrix.platform.os }} - ${{ matrix.compiler }})
          path: build-warning-delta-linux.txt

      - name: Enforce warning regression gate (Linux)
        if: always()
        run: |
          if [ "${WARNING_FAIL_ON_REGRESSION}" != "1" ]; then
            echo "WARNING_FAIL_ON_REGRESSION is disabled; skipping gate."
            exit 0
          fi

          if [ ! -f build-warning-delta-linux.txt ]; then
            echo "Missing build-warning-delta-linux.txt"
            exit 1
          fi

          delta=$(grep -E '^delta=' build-warning-delta-linux.txt | sed 's/^delta=//' || true)
          if [ -z "$delta" ]; then
            echo "Could not parse warning delta for Linux job."
            exit 1
          fi

          if [ "$delta" -gt 0 ]; then
            echo "Warning regression detected in Linux job (delta=$delta)."
            exit 1
          fi

          echo "Warning regression gate passed for Linux (delta=$delta)."

      - name: Linux publish smoke launch
        if: always()
        continue-on-error: true
        run: |
          publish_dir="bin/linux-${{ matrix.platform.path }}/Release/linux-${{ matrix.platform.path }}/publish"
          app="$publish_dir/Nexen"

          if [ ! -f "$app" ]; then
            echo "Missing published binary for smoke launch: $app"
            exit 1
          fi

          chmod +x "$app"
          set +e
          timeout 20s xvfb-run -a "$app" /DoNotSaveSettings > smoke-linux.log 2>&1
          code=$?
          set -e

          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            if grep -Eiq "segmentation fault|sigsegv|core dumped|abort|fatal" smoke-linux.log; then
              echo "Crash signature detected during Linux smoke launch."
            fi
            cat smoke-linux.log
            exit 1
          fi

          if grep -Eiq "segmentation fault|sigsegv|core dumped|abort|fatal" smoke-linux.log; then
            echo "Crash signature detected in Linux smoke log."
            cat smoke-linux.log
            exit 1
          fi

          echo "Linux smoke launch passed (exit code $code)."

      - name: Upload Linux smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Linux Smoke Log (${{ matrix.platform.os }} - ${{ matrix.compiler }})
          path: smoke-linux.log

      - name: Upload Nexen
        uses: actions/upload-artifact@v4
        with:
          name: Nexen (Linux - ${{ matrix.platform.os }} - ${{ matrix.compiler }})
          path: bin/linux-${{ matrix.platform.path }}/Release/linux-${{ matrix.platform.path }}/publish/Nexen

  appimage:
    strategy:
      matrix:
        compiler: [clang_appimage]
        platform: [
          {os: ubuntu-22.04, name: x64, script: Linux/appimage/appimage.sh},
          {os: ubuntu-22.04-arm, name: ARM64, script: Linux/appimage/appimage-arm64.sh}
        ]
      fail-fast: false
    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Pansy (for Pansy.Core reference)
        shell: bash
        run: git clone --depth 1 https://github.com/TheAnsarya/pansy.git "$GITHUB_WORKSPACE/../pansy"

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Install dependencies
        run: |
          sudo apt-get update -qy
          sudo apt-get install -qy libsdl2-dev libfuse2 ccache xvfb # The compilers are already installed on GitHub's runners.

      # Install LLVM 18 for C++23 support (ubuntu-22.04 default clang doesn't support c++23)
      # Also install libc++ since the system libstdc++ doesn't have <format>
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Setup CCache
        uses: ./.github/actions/setup-ccache-action

      - name: Write commit SHA1 to file
        uses: ./.github/actions/build-sha1-action

      - name: Build Nexen (AppImage)
        run: |
          set -o pipefail
          ${{ matrix.platform.script }} 2>&1 | tee build-appimage.log

      - name: Capture runtime dependency report (AppImage publish)
        if: always()
        run: |
          if [ "${{ matrix.platform.name }}" = "x64" ]; then
            arch_path="x64"
          else
            arch_path="arm64"
          fi

          publish_dir="bin/linux-${arch_path}/Release/linux-${arch_path}/publish"
          if [ -f "$publish_dir/Nexen" ]; then
            ldd "$publish_dir/Nexen" > runtime-deps-appimage.txt || true
            readelf -d "$publish_dir/Nexen" > runtime-readelf-appimage.txt || true
          else
            echo "Publish binary missing: $publish_dir/Nexen" > runtime-deps-appimage.txt
            echo "Publish binary missing: $publish_dir/Nexen" > runtime-readelf-appimage.txt
          fi

      - name: Upload runtime dependency report (AppImage publish)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Runtime Dependencies (AppImage - ${{ matrix.platform.name }})
          path: |
            runtime-deps-appimage.txt
            runtime-readelf-appimage.txt

      - name: Generate warning report (AppImage)
        if: always()
        run: |
          if [ -f build-appimage.log ]; then
            grep -Ei "warning" build-appimage.log > build-warning-report-appimage.txt || true
          fi

          if [ ! -f build-warning-report-appimage.txt ] || [ ! -s build-warning-report-appimage.txt ]; then
            echo "No warnings detected in AppImage build log." > build-warning-report-appimage.txt
          fi

      - name: Upload warning report (AppImage)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Warning Report (AppImage - ${{ matrix.platform.name }})
          path: build-warning-report-appimage.txt

      - name: Generate warning delta summary (AppImage)
        if: always()
        run: |
          baseline="${WARNING_BASELINE_APPIMAGE}"
          count=0
          if [ -f build-warning-report-appimage.txt ]; then
            count=$(grep -Eic "\\bwarning\\b" build-warning-report-appimage.txt || true)
          fi
          delta=$((count - baseline))
          {
            echo "job=appimage-${{ matrix.platform.name }}"
            echo "baseline=$baseline"
            echo "count=$count"
            echo "delta=$delta"
          } > build-warning-delta-appimage.txt

      - name: Upload warning delta summary (AppImage)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Warning Delta (AppImage - ${{ matrix.platform.name }})
          path: build-warning-delta-appimage.txt

      - name: Enforce warning regression gate (AppImage)
        if: always()
        run: |
          if [ "${WARNING_FAIL_ON_REGRESSION}" != "1" ]; then
            echo "WARNING_FAIL_ON_REGRESSION is disabled; skipping gate."
            exit 0
          fi

          if [ ! -f build-warning-delta-appimage.txt ]; then
            echo "Missing build-warning-delta-appimage.txt"
            exit 1
          fi

          delta=$(grep -E '^delta=' build-warning-delta-appimage.txt | sed 's/^delta=//' || true)
          if [ -z "$delta" ]; then
            echo "Could not parse warning delta for AppImage job."
            exit 1
          fi

          if [ "$delta" -gt 0 ]; then
            echo "Warning regression detected in AppImage job (delta=$delta)."
            exit 1
          fi

          echo "Warning regression gate passed for AppImage (delta=$delta)."

      - name: AppImage smoke launch
        if: always()
        continue-on-error: true
        run: |
          if [ ! -f Nexen.AppImage ]; then
            echo "Missing AppImage binary for smoke launch."
            exit 1
          fi

          chmod +x Nexen.AppImage
          set +e
          timeout 20s xvfb-run -a ./Nexen.AppImage /DoNotSaveSettings > smoke-appimage.log 2>&1
          code=$?
          set -e

          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            if grep -Eiq "segmentation fault|sigsegv|core dumped|abort|fatal" smoke-appimage.log; then
              echo "Crash signature detected during AppImage smoke launch."
            fi
            cat smoke-appimage.log
            exit 1
          fi

          if grep -Eiq "segmentation fault|sigsegv|core dumped|abort|fatal" smoke-appimage.log; then
            echo "Crash signature detected in AppImage smoke log."
            cat smoke-appimage.log
            exit 1
          fi

          echo "AppImage smoke launch passed (exit code $code)."

      - name: Upload AppImage smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AppImage Smoke Log (${{ matrix.platform.name }})
          path: smoke-appimage.log

      - name: Upload Nexen (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: Nexen (Linux ${{ matrix.platform.name }} - AppImage)
          path: Nexen.AppImage


  macos:
    strategy:
      matrix:
        # NOTE: clang_aot temporarily disabled - .NET 10 ILC crashes on macOS ARM64
        # See issue #238 for details. Re-enable when .NET fixes ILC segfault.
        compiler: [clang]
        platform: [
          {os: macos-14, arch: arm64}
        ]
        include:
          - compiler: clang
            make_flags: ""
      fail-fast: false
    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Pansy (for Pansy.Core reference)
        shell: bash
        run: git clone --depth 1 https://github.com/TheAnsarya/pansy.git "$GITHUB_WORKSPACE/../pansy"

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Install dependencies
        run: |
          brew install sdl2 ccache llvm

      - name: Get brew prefix
        run: |
          echo "brewPrefix=$(brew --prefix)" >> "$GITHUB_ENV"

      - name: Setup CCache
        uses: ./.github/actions/setup-ccache-action
        with:
          ccache-path: '${{ env.brewPrefix }}/opt/ccache/libexec'

      - name: Write commit SHA1 to file
        uses: ./.github/actions/build-sha1-action

      # Use Homebrew's LLVM clang which supports C++23, instead of Apple clang
      - name: Build Nexen
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          export PATH="${LLVM_PREFIX}/bin:$PATH"
          export CC="${LLVM_PREFIX}/bin/clang"
          export CXX="${LLVM_PREFIX}/bin/clang++"
          # Pass linker flags to use Homebrew's libc++ instead of system libc++
          # NEXENFLAGS is used for both compile and link in the makefile
          LIBCXX_FLAGS="-stdlib=libc++ -nostdinc++ -isystem ${LLVM_PREFIX}/include/c++/v1"
          LINK_FLAGS="-L${LLVM_PREFIX}/lib/c++ -Wl,-rpath,${LLVM_PREFIX}/lib/c++ -lc++ -lc++abi"
          make CC="$CC" CXX="$CXX" NEXENFLAGS="${LIBCXX_FLAGS} ${LINK_FLAGS}" ${{ matrix.make_flags }} -j$(sysctl -n hw.logicalcpu)

      - name: Sign binary
        env:
          APP_NAME: bin/osx-${{ matrix.platform.arch }}/Release/osx-${{ matrix.platform.arch }}/publish/Nexen.app
          CERT_DATA: ${{ secrets.MACOS_CERTIFICATE }}
          CERT_PASS: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          ENTITLEMENTS: UI/Nexen.entitlements
          SIGNING_IDENTITY: Nexen
        run: |
          # Skip signing if certificate not configured
          if [ -z "$CERT_DATA" ]; then
            echo "Skipping code signing - MACOS_CERTIFICATE secret not configured"
            exit 0
          fi

          # Export certs
          echo "$CERT_DATA" | base64 --decode > /tmp/certs.p12
          # Create keychain
          security create-keychain -p actions macos-build.keychain
          security default-keychain -s macos-build.keychain
          security unlock-keychain -p actions macos-build.keychain
          security set-keychain-settings -t 3600 -u macos-build.keychain
          # Import certs to keychain
          security import /tmp/certs.p12 -k ~/Library/Keychains/macos-build.keychain -P "$CERT_PASS" -T /usr/bin/codesign -T /usr/bin/productsign
          # Key signing
          security set-key-partition-list -S apple-tool:,apple: -s -k actions macos-build.keychain
          # print identities
          security find-identity -v macos-build.keychain

          echo "[INFO] Signing app file"
          codesign --force --deep --timestamp --keychain macos-build.keychain --options=runtime --entitlements "$ENTITLEMENTS" --sign "$SIGNING_IDENTITY" "$APP_NAME"

      - name: Zip Nexen.app
        run: |
          ditto -c -k --sequesterRsrc --keepParent bin/osx-${{ matrix.platform.arch }}/Release/osx-${{ matrix.platform.arch }}/publish/Nexen.app bin/osx-${{ matrix.platform.arch }}/Release/Nexen.app.zip

      - name: Upload Nexen
        uses: actions/upload-artifact@v4
        with:
          name: Nexen (macOS - ${{ matrix.platform.os }} - ${{ matrix.compiler }})
          path: bin/osx-${{ matrix.platform.arch }}/Release/Nexen.app.zip


  # Create GitHub Release with artifacts when a version tag is pushed
  # Use always() so the release still runs even if some platform builds fail
  # (e.g., if macOS fails, Windows/Linux artifacts are still released)
  release:
    if: always() && startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, appimage, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          mkdir -p tarball-staging

          # Extract version from tag (e.g., v1.1.4)
          VERSION="${GITHUB_REF_NAME}"

          # Windows builds
          cp "artifacts/Nexen (Windows)/Nexen.exe" "release-assets/Nexen-Windows-x64-${VERSION}.exe" || true
          cp "artifacts/Nexen (Windows - AoT)/Nexen.exe" "release-assets/Nexen-Windows-x64-AoT-${VERSION}.exe" || true

          # Helper function to create Linux tarball
          create_linux_tarball() {
            local artifact_path="$1"
            local tarball_name="$2"
            if [ -f "$artifact_path" ]; then
              local staging_dir="tarball-staging/${tarball_name%.tar.gz}"
              mkdir -p "$staging_dir"
              cp "$artifact_path" "$staging_dir/Nexen"
              chmod +x "$staging_dir/Nexen"
              cp LICENSE "$staging_dir/" || true
              tar -czvf "release-assets/${tarball_name}" -C tarball-staging "$(basename "$staging_dir")"
              rm -rf "$staging_dir"
            fi
          }

          # Linux builds (gcc) - as tarballs
          create_linux_tarball "artifacts/Nexen (Linux - ubuntu-22.04 - gcc)/Nexen" "Nexen-Linux-x64-gcc-${VERSION}.tar.gz"
          create_linux_tarball "artifacts/Nexen (Linux - ubuntu-22.04-arm - gcc)/Nexen" "Nexen-Linux-ARM64-gcc-${VERSION}.tar.gz"

          # Linux builds (clang) - as tarballs
          create_linux_tarball "artifacts/Nexen (Linux - ubuntu-22.04 - clang)/Nexen" "Nexen-Linux-x64-${VERSION}.tar.gz"
          create_linux_tarball "artifacts/Nexen (Linux - ubuntu-22.04-arm - clang)/Nexen" "Nexen-Linux-ARM64-${VERSION}.tar.gz"

          # Linux AOT builds - as tarballs
          create_linux_tarball "artifacts/Nexen (Linux - ubuntu-22.04 - clang_aot)/Nexen" "Nexen-Linux-x64-AoT-${VERSION}.tar.gz"

          # Linux AppImage builds (self-contained, no tarball needed)
          cp "artifacts/Nexen (Linux x64 - AppImage)/Nexen.AppImage" "release-assets/Nexen-Linux-x64-${VERSION}.AppImage" || true
          chmod +x "release-assets/Nexen-Linux-x64-${VERSION}.AppImage" || true
          cp "artifacts/Nexen (Linux ARM64 - AppImage)/Nexen.AppImage" "release-assets/Nexen-Linux-ARM64-${VERSION}.AppImage" || true
          chmod +x "release-assets/Nexen-Linux-ARM64-${VERSION}.AppImage" || true

          # macOS builds (ARM64 only - Intel x64 deprecated on GitHub Actions)
          cp "artifacts/Nexen (macOS - macos-14 - clang)/Nexen.app.zip" "release-assets/Nexen-macOS-ARM64-${VERSION}.zip" || true
          # NOTE: macOS AOT disabled - .NET 10 ILC crashes. Re-enable when fixed.
          # cp "artifacts/Nexen (macOS - macos-14 - clang_aot)/Nexen.app.zip" "release-assets/Nexen-macOS-ARM64-AoT-${VERSION}.zip" || true

          # Cleanup
          rm -rf tarball-staging

          ls -la release-assets/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
