name: C++ Tests

on:
  push:
    branches: [ master, cpp-modernization, pansy-export ]
    paths:
      - 'Core/**'
      - 'Core.Tests/**'
      - 'Core.Benchmarks/**'
      - 'Utilities/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'Core/**'
      - 'Core.Tests/**'
      - 'Core.Benchmarks/**'
      - 'Utilities/**'

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-windows:
    name: C++ Unit Tests (Windows)
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64
          vs-prerelease: true

      - name: Setup and install vcpkg
        working-directory: ${{ github.workspace }}
        run: |
          $vcpkgRoot = "${{ github.workspace }}/vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          Push-Location $vcpkgRoot
          git checkout c3867e714dd3a51c272826eea77267876517ed99
          .\bootstrap-vcpkg.bat
          Pop-Location
          $installDir = "$vcpkgRoot/installed"
          $env:VCPKG_ROOT = $vcpkgRoot
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_INSTALLED_DIR=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          vcpkg install --triplet x64-windows --x-manifest-root=${{ github.workspace }} --x-install-root=$installDir --clean-after-build

      - name: Build Core.Tests
        run: |
          $tripletRoot = "$env:VCPKG_INSTALLED_DIR\\x64-windows"
          $env:INCLUDE = "$tripletRoot\\include;$env:INCLUDE"
          $env:LIB = "$tripletRoot\\lib;$tripletRoot\\lib\\manual-link;$env:LIB"
          msbuild Core.Tests\Core.Tests.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v145 /p:VcpkgEnableManifest=true /p:VcpkgManifestInstall=true /p:VcpkgRoot=${{ github.workspace }}\vcpkg /p:VcpkgInstalledDir=$env:VCPKG_INSTALLED_DIR /m

      - name: Run Unit Tests
        working-directory: ${{ github.workspace }}
        run: |
          $tripletBin = "$env:VCPKG_INSTALLED_DIR\x64-windows\bin"
          if (Test-Path $tripletBin) {
            $env:PATH = "$tripletBin;$env:PATH"
          }
          $testExe = "bin\win-x64\Release\Core.Tests.exe"
          if (Test-Path $testExe) {
            & $testExe --gtest_output=xml:test-results.xml
            $exitCode = $LASTEXITCODE
            Write-Host "Tests completed with exit code: $exitCode"
            if ($exitCode -ne 0) {
              exit $exitCode
            }
          } else {
            Write-Error "Test executable not found at: $testExe"
            exit 1
          }

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-windows
          path: test-results.xml
          retention-days: 14

      - name: Test Summary
        if: always()
        run: |
          if (Test-Path test-results.xml) {
            [xml]$results = Get-Content test-results.xml
            $testsuites = $results.testsuites
            Write-Host "## Test Summary"
            Write-Host "- **Total Tests:** $($testsuites.tests)"
            Write-Host "- **Failures:** $($testsuites.failures)"
            Write-Host "- **Disabled:** $($testsuites.disabled)"
            Write-Host "- **Time:** $($testsuites.time)s"
          }

  benchmark-windows:
    name: C++ Benchmarks (Windows)
    runs-on: windows-2025-vs2026
    # Don't run benchmarks on PRs - only on push to main branches
    if: github.event_name == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64
          vs-prerelease: true

      - name: Setup and install vcpkg
        working-directory: ${{ github.workspace }}
        run: |
          $vcpkgRoot = "${{ github.workspace }}/vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          Push-Location $vcpkgRoot
          git checkout c3867e714dd3a51c272826eea77267876517ed99
          .\bootstrap-vcpkg.bat
          Pop-Location
          $installDir = "$vcpkgRoot/installed"
          $env:VCPKG_ROOT = $vcpkgRoot
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_INSTALLED_DIR=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          vcpkg install --triplet x64-windows --x-manifest-root=${{ github.workspace }} --x-install-root=$installDir --clean-after-build

      - name: Build Core.Benchmarks
        run: |
          $tripletRoot = "$env:VCPKG_INSTALLED_DIR\\x64-windows"
          $env:INCLUDE = "$tripletRoot\\include;$env:INCLUDE"
          $env:LIB = "$tripletRoot\\lib;$tripletRoot\\lib\\manual-link;$env:LIB"
          msbuild Core.Benchmarks\Core.Benchmarks.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v145 /p:VcpkgEnableManifest=true /p:VcpkgManifestInstall=true /p:VcpkgRoot=${{ github.workspace }}\vcpkg /p:VcpkgInstalledDir=$env:VCPKG_INSTALLED_DIR /m

      - name: Run Benchmarks (Quick)
        working-directory: ${{ github.workspace }}
        run: |
          $tripletBin = "$env:VCPKG_INSTALLED_DIR\x64-windows\bin"
          if (Test-Path $tripletBin) {
            $env:PATH = "$tripletBin;$env:PATH"
          }
          $benchExe = "bin\win-x64\Release\Core.Benchmarks.exe"
          if (Test-Path $benchExe) {
            # Run with minimal iterations just to verify benchmarks work.
            # Capture output to a file to avoid PowerShell pipeline truncation
            # causing false non-zero exits for the native benchmark process.
            # Full benchmark runs should be done manually or in scheduled workflows.
            $benchLog = "benchmark-quick.log"
            & $benchExe --benchmark_format=console --benchmark_min_time=0.01s --benchmark_filter="BM_(NesCpu|SnesCpu|GbCpu|ChannelFCore)_.*" *> $benchLog
            $exitCode = $LASTEXITCODE

            if (Test-Path $benchLog) {
              Get-Content $benchLog | Select-Object -First 200
            }

            if ($exitCode -ne 0) {
              Write-Error "Benchmark smoke run failed with exit code: $exitCode"
              exit $exitCode
            }
          } else {
            Write-Error "Benchmark executable not found at: $benchExe"
            exit 1
          }
